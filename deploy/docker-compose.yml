name: data-explorer

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-data_explorer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-data_explorer}
      POSTGRES_DB: ${POSTGRES_DB:-data_explorer}
    volumes:
      - de-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-data_explorer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: ":8080"
      HTTP_ALLOWED_ORIGINS: ${HTTP_ALLOWED_ORIGINS:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-data_explorer}:${POSTGRES_PASSWORD:-data_explorer}@postgres:5432/${POSTGRES_DB:-data_explorer}?sslmode=disable
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?set JWT_SIGNING_KEY in deploy/.env - see README}
      CONNECTION_ENCRYPTION_KEY: ${CONNECTION_ENCRYPTION_KEY:?set CONNECTION_ENCRYPTION_KEY in deploy/.env - see README}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  de-postgres-data:
